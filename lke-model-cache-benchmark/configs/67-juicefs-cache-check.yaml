apiVersion: batch/v1
kind: Job
metadata:
  name: juicefs-cache-check
  namespace: model-cache-benchmark
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: juicefs-cache-check
    spec:
      restartPolicy: Never
      nodeSelector:
        pool: standard
      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
      containers:
        - name: check
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -ec
            - |
              if test -s /models/model.gguf && test -f /models/.ready; then
                echo "cache_hit=true"
              else
                echo "cache_hit=false"
              fi
          volumeMounts:
            - name: models
              mountPath: /models
              mountPropagation: HostToContainer
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: juicefs-model-cache
