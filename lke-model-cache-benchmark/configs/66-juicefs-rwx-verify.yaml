apiVersion: batch/v1
kind: Job
metadata:
  name: juicefs-rwx-write
  namespace: model-cache-benchmark
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: juicefs-rwx-write
    spec:
      restartPolicy: Never
      nodeSelector:
        pool: standard
      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
      containers:
        - name: write
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -ec
            - |
              date '+%Y-%m-%dT%H:%M:%S%z' > /models/rwx-marker.txt
              test -s /models/rwx-marker.txt
          volumeMounts:
            - name: models
              mountPath: /models
              mountPropagation: HostToContainer
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: juicefs-model-cache
---
apiVersion: batch/v1
kind: Job
metadata:
  name: juicefs-rwx-read
  namespace: model-cache-benchmark
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: juicefs-rwx-read
    spec:
      restartPolicy: Never
      nodeSelector:
        pool: standard
      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
      containers:
        - name: read
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -ec
            - |
              for _ in $(seq 1 60); do
                if test -s /models/rwx-marker.txt; then
                  cat /models/rwx-marker.txt
                  exit 0
                fi
                sleep 2
              done
              echo "Timed out waiting for RWX marker" >&2
              exit 1
          volumeMounts:
            - name: models
              mountPath: /models
              mountPropagation: HostToContainer
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: juicefs-model-cache
