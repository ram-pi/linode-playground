apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-juicefs-rwx
  namespace: model-cache-benchmark
  labels:
    app: llama-juicefs-rwx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-juicefs-rwx
  template:
    metadata:
      labels:
        app: llama-juicefs-rwx
    spec:
      nodeSelector:
        pool: gpu
      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: juicefs-model-cache
        - name: benchmark
          emptyDir: {}
      containers:
        - name: llama-server
          image: ghcr.io/ggml-org/llama.cpp:server-cuda
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: MODEL_PATH
              value: /models/model.gguf
          command:
            - /bin/sh
            - -ec
            - |
              test -s "$MODEL_PATH"
              start=$(date +%s%3N)
              echo "$start" > /benchmark/server_start_ms
              if command -v llama-server >/dev/null 2>&1; then
                exec llama-server -m "$MODEL_PATH" --host 0.0.0.0 --port 8080 --n-gpu-layers 99 --ctx-size 2048
              fi
              exec /app/llama-server -m "$MODEL_PATH" --host 0.0.0.0 --port 8080 --n-gpu-layers 99 --ctx-size 2048
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 120
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 180
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
              mountPropagation: HostToContainer
            - name: benchmark
              mountPath: /benchmark
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: llama-juicefs-rwx
  namespace: model-cache-benchmark
spec:
  selector:
    app: llama-juicefs-rwx
  ports:
    - name: http
      port: 8080
      targetPort: http
