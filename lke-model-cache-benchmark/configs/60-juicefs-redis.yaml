apiVersion: apps/v1
kind: Deployment
metadata:
  name: juicefs-redis
  namespace: model-cache-benchmark
  labels:
    app: juicefs-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: juicefs-redis
  template:
    metadata:
      labels:
        app: juicefs-redis
    spec:
      nodeSelector:
        pool: standard
      containers:
        - name: redis
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory-policy
            - noeviction
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: juicefs-redis
  namespace: model-cache-benchmark
spec:
  selector:
    app: juicefs-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
