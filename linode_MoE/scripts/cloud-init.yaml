#cloud-config
package_update: true
package_upgrade: true

packages:
  - jq
  - curl
  - wget
  - ca-certificates
  - gnupg
  - lsb-release
  - apt-transport-https
  - software-properties-common
  - build-essential
  - cmake
  - ninja-build
  - pkg-config
  - python3
  - python3-pip
  - python3-venv
  - git
  - tmux
  - nvtop

runcmd:
  # Security hardening for SSH.
  - sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^#*ChallengeResponseAuthentication.*/ChallengeResponseAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^#*KbdInteractiveAuthentication.*/KbdInteractiveAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart sshd

  # Docker CE installation.
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
    $(. /etc/os-release && echo ${UBUNTU_CODENAME}) stable" | tee /etc/apt/sources.list.d/docker.list >/dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker

  # NVIDIA driver + CUDA toolkit install.
  - apt-get install -y linux-headers-$(uname -r)
  - wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb -O /tmp/cuda-keyring.deb
  - dpkg -i /tmp/cuda-keyring.deb
  - apt-get update
  - apt-get install -y cuda-toolkit-12-8 nvidia-open

  # NVIDIA container runtime.
  - curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  - |
    curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
      | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
      | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  - apt-get update
  - apt-get install -y nvidia-container-toolkit
  - nvidia-ctk runtime configure --runtime=docker
  - systemctl restart docker

  # Python environment for vLLM and benchmarking helpers.
  - python3 -m venv /opt/linode-moe/.venv
  - /opt/linode-moe/.venv/bin/pip install --upgrade pip setuptools wheel
  - /opt/linode-moe/.venv/bin/pip install "vllm>=0.8.5" "openai>=1.40.0" "requests>=2.32.0" "numpy>=1.26.0" ninja

  # Helper script to validate runtime quickly.
  - |
    cat <<'EOF' >/usr/local/bin/linode-moe-healthcheck
    #!/usr/bin/env bash
    set -euo pipefail
    echo "=== GPU ==="
    nvidia-smi || true
    echo
    echo "=== Docker Runtime ==="
    docker info --format '{{json .Runtimes}}' || true
    echo
    echo "=== Build Tooling ==="
    command -v ninja || true
    ninja --version || true
    echo
    echo "=== vLLM Version ==="
    /opt/linode-moe/.venv/bin/python -c "import vllm; print(vllm.__version__)" || true
    EOF
  - chmod +x /usr/local/bin/linode-moe-healthcheck
  # Stage benchmark helper scripts under /opt for VM-local execution.
  - mkdir -p /opt/linode-moe/results

  - echo "Cloud-init bootstrap completed." | tee -a /var/log/linode-moe-bootstrap.log
