apiVersion: kubefledged.io/v1alpha2
kind: ImageCache
metadata:
  name: node-image-cache
  namespace: kube-fledged
  labels:
    app: node-image-cache
spec:
  cacheSpec:
    - images:
        - python:3.11-slim
        - nvidia/cuda:12.4.0-runtime-ubuntu22.04
