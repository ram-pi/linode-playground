---
- name: Configure Keepalived for VLAN VIP failover
  hosts: vip_nodes
  become: true
  vars:
    vrrp_router_id: 51
    vrrp_advert_int: 1
    vrrp_priority_primary: 200
    vrrp_priority_secondary: 100
    healthcheck_url: ""
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - curl
          - keepalived
        state: present
        update_cache: yes

    - name: Detect VLAN interface from configured VLAN IP
      shell: |
        set -euo pipefail
        ip -o -4 addr show | awk '$4 ~ /^{{ vlan_ip }}\// {print $2; exit}'
      args:
        executable: /bin/bash
      register: vlan_iface_cmd
      changed_when: false
      retries: 12
      delay: 5
      until: vlan_iface_cmd.stdout | trim != ""

    - name: Fail if VLAN interface was not detected
      fail:
        msg: "Could not detect VLAN interface for VLAN IP {{ vlan_ip }}"
      when: vlan_iface_cmd.stdout | trim == ""

    - name: Set VLAN interface fact
      set_fact:
        vlan_interface: "{{ vlan_iface_cmd.stdout | trim }}"
        vrrp_priority: "{{ vrrp_priority_primary if node_role == 'primary' else vrrp_priority_secondary }}"

    - name: Install keepalived health check script
      copy:
        dest: /usr/local/bin/check_vip_health.sh
        mode: "0644"
        content: |
          #!/bin/bash
          set -euo pipefail
          ip link show "{{ vlan_interface }}" >/dev/null 2>&1
          ip -o -4 addr show dev "{{ vlan_interface }}" | grep -q "{{ vlan_ip }}/"
          if [[ -n "{{ healthcheck_url }}" ]]; then
            curl -fsS --max-time 2 "{{ healthcheck_url }}" >/dev/null
          fi

    - name: Set execute permissions on health check script
      file:
        path: /usr/local/bin/check_vip_health.sh
        mode: "0755"
        owner: root
        group: root

    - name: Write keepalived config
      template:
        src: templates/keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: "0644"

    - name: Validate keepalived configuration
      command: keepalived -t -f /etc/keepalived/keepalived.conf
      changed_when: false

    - name: Enable keepalived service
      systemd:
        name: keepalived
        daemon_reload: yes
        enabled: yes
        state: restarted
